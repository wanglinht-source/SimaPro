<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PMKS Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #198754 0%, #0f5132 100%); height: 100vh; }
        .login-card { border: none; border-radius: 20px; overflow: hidden; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .input-group-text { background: transparent; border-right: none; }
        .form-control { border-left: none; padding-left: 0; }
        .form-control:focus { box-shadow: none; border-color: #dee2e6; }
        .btn-login { border-radius: 10px; padding: 12px; font-weight: 600; transition: 0.3s; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="login-card shadow-lg p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-success" style="font-size: 3rem;"></i>
                        <h4 class="fw-bold mt-2">Welcome Back</h4>
                        <p class="text-muted small">Silakan login untuk mengakses data</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="input-group mb-3 border rounded px-2">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="username" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="input-group mb-4 border rounded px-2">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" class="form-control" placeholder="Password" required>
                        </div>
                        <button type="submit" id="loginBtn" class="btn btn-success btn-login w-100">
                            Masuk Sekarang
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = "Memproses...";

            const res = await callAPI({ 
                action: 'login', 
                username: document.getElementById('username').value, 
                password: document.getElementById('password').value 
            });
            
            if (res.status === 'success') {
                    // Pastikan server Anda mengirimkan 'role' dan 'nama' dalam respons JSON
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('role', res.role);
                    sessionStorage.setItem('nama', res.nama); // <--- Tambahkan baris ini
                    
                    // Redirect berdasarkan role
                    window.location.href = res.role === 'management' ? 'pages/dashboard_management.html' : 'pages/dashboard_petugas.html';
                } else {
                new bootstrap.Toast(document.getElementById('liveToast')).show();
                document.getElementById('toastMessage').innerText = res.message;
                btn.disabled = false;
                btn.innerText = "Login";
            }
        });
    </script>
</body>
</html>
