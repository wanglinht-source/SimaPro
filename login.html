<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitoring PMKS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow p-4">
                    <h3 class="text-center mb-4">Login Monitoring</h3>
                    <form id="loginForm">
                        <div class="mb-3">
                            <input type="text" id="username" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" id="password" class="form-control" placeholder="Password" required>
                        </div>
                        <button type="submit" id="loginBtn" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = "Memproses...";

            const res = await callAPI({ 
                action: 'login', 
                username: document.getElementById('username').value, 
                password: document.getElementById('password').value 
            });
            
            if (res.status === 'success') {
                    // Pastikan server Anda mengirimkan 'role' dan 'nama' dalam respons JSON
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('role', res.role);
                    sessionStorage.setItem('nama', res.nama); // <--- Tambahkan baris ini
                    
                    // Redirect berdasarkan role
                    window.location.href = res.role === 'management' ? 'pages/dashboard_management.html' : 'pages/dashboard_petugas.html';
                } else {
                new bootstrap.Toast(document.getElementById('liveToast')).show();
                document.getElementById('toastMessage').innerText = res.message;
                btn.disabled = false;
                btn.innerText = "Login";
            }
        });
    </script>
</body>
</html>
