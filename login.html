<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SimaPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #198754 0%, #0f5132 100%); height: 100vh; }
        .login-card { border: none; border-radius: 20px; background: rgba(255, 255, 255, 0.95); }
        .btn-login { border-radius: 10px; padding: 12px; font-weight: 600; }
        /* Toast di tengah */
        .toast-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 col-10">
                <div class="login-card shadow-lg p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-success" style="font-size: 3rem;"></i>
                        <h4 class="fw-bold mt-2">Welcome Back</h4>
                         <p class="text-muted small">Silakan login untuk mengakses data</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="input-group mb-3 border rounded px-2">
                            <span class="input-group-text bg-white border-0"><i class="bi bi-person"></i></span>
                            <input type="text" id="username" class="form-control border-0" placeholder="Username" required>
                        </div>
                        <div class="input-group mb-4 border rounded px-2">
                            <span class="input-group-text bg-white border-0"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" class="form-control border-0" placeholder="Password" required>
                        </div>
                        <button type="submit" id="loginBtn" class="btn btn-success btn-login w-100">
                            Masuk Sekarang
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container">
        <div id="loginToast" class="toast align-items-center text-white bg-danger border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-bold" id="toastMessage"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const toastEl = document.getElementById('loginToast');
            const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
            
            // Tampilan Loading
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" aria-hidden="true"></span> Memproses...';

            try {
                const res = await callAPI({ 
                    action: 'login', 
                    username: document.getElementById('username').value, 
                    password: document.getElementById('password').value 
                });
                
                if (res.status === 'success') {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('role', res.role);
                    sessionStorage.setItem('nama', res.nama);
                    
                    const dashboardRoutes = {
                        'management': 'pages/dashboard_management.html',
                        'petugas': 'pages/dashboard_petugas.html',
                        'petugas2': 'pages/dashboard_petugas2.html'
                    };
                    
                    window.location.href = dashboardRoutes[res.role] || 'login.html';
                } else {
                    document.getElementById('toastMessage').innerText = res.message || "Login Gagal!";
                    toast.show();
                    btn.disabled = false;
                    btn.innerText = "Masuk Sekarang";
                }
            } catch (err) {
                document.getElementById('toastMessage').innerText = "Koneksi server gagal.";
                toast.show();
                btn.disabled = false;
                btn.innerText = "Masuk Sekarang";
            }
        });
    </script>
</body>
</html>
