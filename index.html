<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMKS Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --utama-hijau: #198754; }
        .bg-success { background-color: var(--utama-hijau) !important; }
        .nav-pills .nav-link.active { background-color: var(--utama-hijau); }
        .scroll-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-light">

    <div id="landingPage" class="vh-100 d-flex flex-column justify-content-center align-items-center text-center p-3">
        <i class="bi bi-graph-up-arrow text-success" style="font-size: 5rem;"></i>
        <h2 class="fw-bold">SimaPro</h2>
        <p class="text-muted">Sistem Monitoring Produksi Real-time</p>
        <button class="btn btn-success btn-lg px-5 shadow-sm mt-3" onclick="window.location.href='login.html'">
        <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </button>
    </div>

    <div id="dashboardContent" class="d-none">
        <nav class="navbar navbar-dark bg-success shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand fw-bold"><i class="bi bi-speedometer2"></i> PMKS DASHBOARD</span>
            </div>
        </nav>

        <div class="container py-4">
            </div>
    </div>

    <script>
        function showDashboard() {
            document.getElementById('landingPage').classList.add('d-none');
            document.getElementById('dashboardContent').classList.remove('d-none');
            // Panggil API saat user klik tombol
            callJSONP('report', 'handleReport');
            callJSONP('detail_trip', 'handleTrip');
        }
        
        // --- Copy paste seluruh fungsi JS Anda di sini ---
    </script>
</body>
</html>
