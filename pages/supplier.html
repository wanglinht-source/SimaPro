<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Supplier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <a href="dashboard_petugas.html" class="btn btn-outline-secondary mb-3 btn-sm">
            <i class="bi bi-arrow-left"></i> Kembali ke Dashboard
        </a>

        <div class="card shadow-sm p-4 border-0">
            <h5 class="mb-3 text-success"><i class="bi bi-building"></i> Tambah Supplier Baru</h5>
            <form id="supplierForm">
                <div class="mb-3">
                    <label class="form-label">Nama Supplier</label>
                    <input type="text" id="nama_supplier" class="form-control" placeholder="Masukkan nama supplier" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Alamat</label>
                    <textarea id="alamat_supplier" class="form-control" rows="2" placeholder="Masukkan alamat lengkap" required></textarea>
                </div>
                <button type="submit" id="submitBtn" class="btn btn-success w-100">Simpan Supplier</button>
            </form>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // Cek status login setiap kali halaman dimuat
window.addEventListener('DOMContentLoaded', () => {
    if (!sessionStorage.getItem('isLoggedIn')) {
        window.location.href = '../login.html';
    }
});

        document.getElementById('supplierForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            
            // Ambil data dari form
            const nama = document.getElementById('nama_supplier').value;
            const alamat = document.getElementById('alamat_supplier').value;
            const createdBy = sessionStorage.getItem('nama') || 'User';
            const createdAt = new Date().toLocaleString('id-ID'); 

            btn.disabled = true; 
            btn.innerText = "Menyimpan...";

            // Kirim data ke server
            const res = await callAPI({
                action: 'input_supplier',
                nama: document.getElementById('nama_supplier').value,
                alamat: document.getElementById('alamat_supplier').value,
                user: sessionStorage.getItem('nama') || 'User'
            
            });

            const toastEl = document.getElementById('liveToast');
            document.getElementById('toastMessage').innerText = res.message;
            new bootstrap.Toast(toastEl).show();
            
            if(res.status === 'success') {
                document.getElementById('supplierForm').reset();
            }
            btn.disabled = false; 
            btn.innerText = "Simpan Supplier";
        });
    </script>
</body>
</html>
