<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input PMKS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <a href="dashboard_petugas.html" class="btn btn-outline-secondary mb-3 btn-sm">
            <i class="bi bi-arrow-left"></i> Kembali ke Dashboard
        </a>

        <div class="card shadow-sm p-4 border-0">
            <h5 class="mb-3 text-info"><i class="bi bi-truck"></i> Form Input PMKS</h5>
            <form id="pmksForm">
                <div class="mb-3">
                    <label class="form-label">Tanggal</label>
                    <input type="date" id="tgl" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">No. Tiket</label>
                        <input type="text" id="no_tiket" class="form-control" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Plat Nomor</label>
                        <input type="text" id="plat" class="form-control" placeholder="Contoh : BM9398SC" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Supplier</label>
                    <select id="supplierSelect" class="form-select" required>
                        <option value="">-- Pilih Supplier --</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Brutto (KG)</label>
                        <input type="number" id="brutto" class="form-control calc" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Potongan (KG)</label>
                        <input type="number" id="potongan" class="form-control calc" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label text-muted">Netto (KG)</label>
                        <input type="number" id="netto" class="form-control" readonly>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label text-muted">% Potongan</label>
                        <input type="text" id="persenPot" class="form-control" readonly>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="btn btn-info w-100 text-white">Simpan PMKS</button>
            </form>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // Cek status login setiap kali halaman dimuat
window.addEventListener('DOMContentLoaded', () => {
    if (!sessionStorage.getItem('isLoggedIn')) {
        window.location.href = '../login.html';
    }
});

        // Kalkulasi Real-time
        document.querySelectorAll('.calc').forEach(input => {
            input.addEventListener('input', () => {
                const b = parseFloat(document.getElementById('brutto').value) || 0;
                const p = parseFloat(document.getElementById('potongan').value) || 0;
                const netto = b - p;
                const persen = b > 0 ? ((p / b) * 100).toFixed(2) : 0;
                document.getElementById('netto').value = netto >= 0 ? netto : 0;
                document.getElementById('persenPot').value = persen + "%";
            });
        });

        // Setup DB & Tanggal
        let db;
        const request = indexedDB.open("PMKS_DB", 2);
        request.onsuccess = (e) => { db = e.target.result; loadSuppliers(); };
        document.getElementById('tgl').valueAsDate = new Date();

        function loadSuppliers() {
            const select = document.getElementById('supplierSelect');
            const tx = db.transaction("supplier", "readonly");
            tx.objectStore("supplier").getAll().onsuccess = (e) => {
                e.target.result.forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item.nama; opt.textContent = item.nama;
                    select.appendChild(opt);
                });
            };
        }

        // Submit form
        document.getElementById('pmksForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Menyimpan...";
            
            // Format Tanggal dd/mm/yyyy
            const rawDate = document.getElementById('tgl').value; // yyyy-mm-dd
            const [y, m, d] = rawDate.split('-');
            const formattedDate = `${d}/${m}/${y}`;

            const res = await callAPI({
                action: 'input_pmks',
                tgl: formattedDate,
                tiket: document.getElementById('no_tiket').value,
                plat: document.getElementById('plat').value,
                supplier: document.getElementById('supplierSelect').value,
                brutto: document.getElementById('brutto').value,
                pot: document.getElementById('potongan').value,
                netto: document.getElementById('netto').value,
                pct: document.getElementById('persenPot').value,
                user: sessionStorage.getItem('nama') || 'User'
            });
            
            // Tampilkan Toast
            const toastEl = document.getElementById('liveToast');
            document.getElementById('toastMessage').innerText = res.message;
            new bootstrap.Toast(toastEl).show();
            
            if(res.status === 'success') {
                document.getElementById('pmksForm').reset();
                document.getElementById('tgl').valueAsDate = new Date();
            }
            btn.disabled = false; btn.innerText = "Simpan PMKS";
        });
    </script>
</body>
</html>
