<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --utama-hijau: #198754; }
        .bg-success { background-color: var(--utama-hijau) !important; }
        .kpi-card { border-radius: 12px; border: none; border-left: 5px solid var(--utama-hijau); }
        .nav-pills .nav-link.active { background-color: var(--utama-hijau); }
        .sticky-top { z-index: 1020; }
        #loader { z-index: 9999; background: rgba(255,255,255,0.8); }
        .table td, .table th { white-space: nowrap; font-size: 0.85rem; }
    </style>
</head>
<body class="bg-light">

<div id="loader" class="position-fixed vh-100 vw-100 d-flex justify-content-center align-items-center d-none">
    <div class="spinner-border text-success" role="status"></div>
</div>

<nav class="navbar navbar-dark bg-success shadow-sm mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold"><i class="bi bi-speedometer2"></i> PMKS MANAGEMENT</span>
        <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container pb-5">
    <div class="card shadow-sm p-3 mb-4 border-0">
        <div class="row align-items-end g-2">
            <div class="col-md-3"><label class="small fw-bold">Dari</label><input type="date" id="dateStart" class="form-control"></div>
            <div class="col-md-3"><label class="small fw-bold">Sampai</label><input type="date" id="dateEnd" class="form-control"></div>
            <div class="col-md-2"><button class="btn btn-success w-100" onclick="applyFilter()"><i class="bi bi-filter"></i> Filter</button></div>
            <div class="col-md-4 text-md-end"><span class="badge bg-secondary p-2" id="infoPeriode">Periode: -</span></div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3 col-6"><div class="card kpi-card shadow-sm p-3 bg-white h-100"><small class="text-muted">ESTIMASI (KG)</small><h3 id="totalEst" class="fw-bold text-dark">0</h3></div></div>
        <div class="col-md-3 col-6"><div class="card kpi-card shadow-sm p-3 bg-white h-100"><small class="text-muted">REALISASI (KG)</small><h3 id="totalReal" class="fw-bold text-primary">0</h3></div></div>
        <div class="col-md-3 col-6"><div class="card kpi-card shadow-sm p-3 bg-white h-100"><small class="text-muted">ACHIEVEMENT</small><h3 id="avgAch" class="fw-bold text-success">0%</h3></div></div>
        <div class="col-md-3 col-6"><div class="card kpi-card shadow-sm p-3 bg-white h-100"><small class="text-muted">AVG POTONGAN</small><h3 id="avgPot" class="fw-bold text-danger mb-0">0%</h3><small id="totalPotKg" class="text-muted" style="font-size: 0.75rem;">(0 Kg)</small></div></div>
    </div>

    <ul class="nav nav-pills mb-3 shadow-sm bg-white p-2 rounded" id="pills-tab">
        <li class="nav-item flex-fill"><button class="nav-link active w-100" data-bs-toggle="pill" data-bs-target="#tab1">Pencapaian</button></li>
        <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#tab2">Analisa Harian</button></li>
        <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#tab3">Detail Trip</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab1">
            <div class="row">
                <div class="col-md-5 mb-3"><div class="card p-3 shadow-sm border-0 h-100"><canvas id="donutChart"></canvas></div></div>
                <div class="col-md-7">
                    <div class="card p-3 shadow-sm border-0 mb-3"><canvas id="lineEstReal" style="max-height: 150px;"></canvas></div>
                    <div class="card p-3 shadow-sm border-0"><canvas id="linePotongan" style="max-height: 150px;"></canvas></div>
                </div>
            </div>
            <div class="table-responsive bg-white rounded shadow-sm border mt-3"><table class="table table-hover mb-0"><thead class="table-light"><tr><th>Supplier</th><th class="text-end">Est (Kg)</th><th class="text-end">Real (Kg)</th><th class="text-center">Var %</th></tr></thead><tbody id="rekapBody"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab2">
            <div class="table-responsive bg-white shadow-sm rounded border" style="max-height: 60vh;">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-light sticky-top"><tr><th>Tgl</th><th>Supplier</th><th class="text-end">Est</th><th class="text-end">Real</th><th class="text-end">Pot (Kg)</th><th class="text-center">Var %</th><th class="text-center">% Pot</th></tr></thead>
                    <tbody id="analisaBody"></tbody>
                </table>
            </div>
        </div>

<div class="tab-pane fade" id="tab3">
    <div class="table-responsive bg-white shadow-sm rounded border" style="max-height: 500px;">
        <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-light sticky-top">
                <tr>
                    <th>Tgl</th>
                    <th>Supplier</th>
                    <th>Plat Mobil</th>
                    <th class="text-end">Netto</th>
                    <th class="text-end">Pot (Kg)</th>
                    <th class="text-center">Pot (%)</th>
                </tr>
            </thead>
            <tbody id="tripBody"> </tbody>
        </table>
    </div>
</div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxk4EDnw7K3EcbHdfrbKPy6QVjWreu8N-HB7yn1bcOUJ64ggnneSuUFDFnDWaV7Xv4P/exec";
let allReportData = [];
let allTripData = [];
let myDonutChart = null;

// --- UTILS ---
function toggleLoader(show) {
    document.getElementById('loader').classList.toggle('d-none', !show);
}

function convertDate(strDate) {
    if (strDate instanceof Date) return strDate;
    if (typeof strDate === 'number') return new Date((strDate - 25569) * 86400 * 1000);
    if (typeof strDate === 'string') {
        if (strDate.includes('/')) {
            const parts = strDate.split('/');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }
        return new Date(strDate);
    }
    return new Date(0);
}

function formatTglInput(date) {
    return date.toISOString().split('T')[0];
}

// Fungsi format angka 2 desimal & minus dalam kurung merah
function formatAngka(num) {
    const n = parseFloat(num);
    if (isNaN(n)) return "0.00";
    if (n < 0) {
        return `<span class="text-danger">(${Math.abs(n).toFixed(2)})</span>`;
    }
    return n.toFixed(2);
}

// --- DATA FETCHING ---
function callJSONP(action, callback) {
    toggleLoader(true);
    const script = document.createElement('script');
    script.src = `${API_URL}?action=${action}&callback=${callback}`;
    document.body.appendChild(script);
}

function handleReport(data) {
    allReportData = data;
    applyFilter();
    toggleLoader(false);
}

function handleTrip(data) {
    allTripData = data;
    applyFilter(); // Panggil applyFilter lagi untuk update tab trip
    toggleLoader(false);
}

function applyFilter() {
    const start = document.getElementById('dateStart').value;
    const end = document.getElementById('dateEnd').value;
    const startDate = start ? new Date(start) : null;
    const endDate = end ? new Date(end) : null;

    if (allReportData.length === 0) return;

    const filteredReport = allReportData.filter(i => {
        const itemDate = convertDate(i.tanggal);
        if (isNaN(itemDate.getTime())) return false;
        if (startDate && itemDate < startDate) return false;
        if (endDate && itemDate > endDate) return false;
        return true;
    });

    document.getElementById('infoPeriode').innerText = `Periode: ${start || 'Awal'} s.d ${end || 'Sekarang'}`;

    renderKPI(filteredReport);
    renderDonut(filteredReport);
    renderLineCharts(filteredReport);
    renderRekap(filteredReport);
    renderAnalisa(filteredReport);
    renderTrip(allTripData, startDate, endDate);
}

function renderKPI(data) {
    let est = 0, real = 0, totalPotKg = 0, totalBrutto = 0;

    data.forEach(i => {
        est += Number(i.est) || 0;
        real += Number(i.real) || 0;
        
        // Ambil nilai pot_kg dan brutto dari struktur tabel baru
        const pk = Number(i.pot_kg) || 0;
        const br = Number(i.brutto) || 0;
        
        totalPotKg += pk;
        totalBrutto += br;
    });

    // Update Tampilan Estimasi & Realisasi
    document.getElementById('totalEst').innerText = est.toLocaleString();
    document.getElementById('totalReal').innerText = real.toLocaleString();
    
    // Achievement
    const achPerc = est > 0 ? (real / est) * 100 : 0;
    document.getElementById('avgAch').innerText = achPerc.toFixed(1) + "%";
    
    // Avg Potongan (%)
    const avgPotPerc = totalBrutto > 0 ? (totalPotKg / totalBrutto) * 100 : 0;
    document.getElementById('avgPot').innerText = avgPotPerc.toFixed(2) + "%";

    // TAMPILKAN TOTAL POT (KG)
    // toLocaleString() membuat angka lebih mudah dibaca (misal: 1,234)
    document.getElementById('totalPotKg').innerText = `(${totalPotKg.toLocaleString()} Kg)`;
}

function formatTglLaporan(strDate) {
    const d = convertDate(strDate);
    if (isNaN(d.getTime())) return strDate; // Kembalikan string asli jika gagal konversi

    const bulanNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
    
    const tgl = d.getDate().toString().padStart(2, '0');
    const bln = bulanNames[d.getMonth()];
    const thn = d.getFullYear().toString().substring(2); // Ambil 2 angka terakhir tahun

    return `${tgl} ${bln} ${thn}`;
}

function renderAnalisa(data) {
    const tbody = document.getElementById('analisaBody');
    tbody.innerHTML = "";
    let lastTgl = "";
    
    data.forEach(i => {
        const tglBerformat = formatTglLaporan(i.tanggal);
        let tglCol = (tglBerformat !== lastTgl) ? `<strong>${tglBerformat}</strong>` : "";
        lastTgl = tglBerformat;

        tbody.innerHTML += `<tr>
            <td style="font-size: 0.8rem;">${tglCol}</td>
            <td style="font-size: 0.8rem;">${i.supplier}</td>
            <td class="text-end" style="font-size: 0.85rem;">${(Number(i.est) || 0).toLocaleString()}</td>
            <td class="text-end" style="font-size: 0.85rem;">${(Number(i.real) || 0).toLocaleString()}</td>
            <td class="text-end" style="font-size: 0.85rem;">${(Number(i.pot_kg) || 0).toLocaleString()}</td>
            <td class="text-center">${formatAngka(i.var)}</td>
            <td class="text-center text-danger">${formatAngka(i.pot_persen)}</td>
        </tr>`;
    });
}

function renderDonut(data) {
    const ctx = document.getElementById('donutChart').getContext('2d');
    const grouped = {};
    data.forEach(i => {
        grouped[i.supplier] = (grouped[i.supplier] || 0) + (Number(i.real) || 0);
    });

    if (myDonutChart) myDonutChart.destroy();
    myDonutChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(grouped),
            datasets: [{
                data: Object.values(grouped),
                backgroundColor: ['#198754', '#0d6efd', '#ffc107', '#dc3545', '#6610f2', '#fd7e14']
            }]
        },
        options: { plugins: { legend: { position: 'bottom' } } }
    });
}

let lineChartEstReal = null;
let lineChartPot = null;

function renderLineCharts(data) {
    // Menyiapkan data harian
    const labels = [...new Set(data.map(i => formatTglLaporan(i.tanggal)))];
    const estData = labels.map(l => data.filter(i => formatTglLaporan(i.tanggal) === l).reduce((a, b) => a + Number(b.est), 0));
    const realData = labels.map(l => data.filter(i => formatTglLaporan(i.tanggal) === l).reduce((a, b) => a + Number(b.real), 0));
    const potData = labels.map(l => {
        const daily = data.filter(i => formatTglLaporan(i.tanggal) === l);
        const totalBrutto = daily.reduce((a, b) => a + Number(b.brutto), 0);
        const totalPot = daily.reduce((a, b) => a + Number(b.pot_kg), 0);
        return totalBrutto > 0 ? (totalPot / totalBrutto) * 100 : 0;
    });

    // Menghancurkan chart lama jika ada (agar tidak tumpang tindih)
    if (lineChartEstReal) lineChartEstReal.destroy();
    if (lineChartPot) lineChartPot.destroy();

    // Grafik Est vs Real
    lineChartEstReal = new Chart(document.getElementById('lineEstReal'), {
        type: 'line',
        data: { labels, datasets: [
            { label: 'Est (Kg)', data: estData, borderColor: '#6c757d', tension: 0.1 },
            { label: 'Real (Kg)', data: realData, borderColor: '#198754', tension: 0.1 }
        ]},
        options: { responsive: true, plugins: { title: { display: true, text: 'Tren Est vs Real' } } }
    });

    // Grafik Potongan
    lineChartPot = new Chart(document.getElementById('linePotongan'), {
        type: 'line',
        data: { labels, datasets: [
            { label: '% Potongan', data: potData, borderColor: '#dc3545', backgroundColor: 'rgba(220, 53, 69, 0.1)', fill: true }
        ]},
        options: { responsive: true, plugins: { title: { display: true, text: 'Tren % Potongan Harian' } } }
    });
}

function renderRekap(data) {
    const tbody = document.getElementById('rekapBody');
    const rekap = {};
    data.forEach(i => {
        if(!rekap[i.supplier]) rekap[i.supplier] = { est: 0, real: 0 };
        rekap[i.supplier].est += Number(i.est) || 0;
        rekap[i.supplier].real += Number(i.real) || 0;
    });

    tbody.innerHTML = Object.keys(rekap).map(s => {
        const v = rekap[s];
        const vperc = v.est > 0 ? ((v.real / v.est) * 100).toFixed(1) : 0;
        return `<tr>
            <td class="fw-bold">${s}</td>
            <td class="text-end">${v.est.toLocaleString()}</td>
            <td class="text-end">${v.real.toLocaleString()}</td>
            <td class="text-center"><span class="badge ${vperc >= 95 ? 'bg-success' : 'bg-danger'}">${vperc}%</span></td>
        </tr>`;
    }).join('');
}

function renderTrip(data, startDate, endDate) {
    const tbody = document.getElementById('tripBody'); // Target ke tbody
    const filtered = data.filter(i => {
        const itemDate = convertDate(i.tanggal);
        if (startDate && itemDate < startDate) return false;
        if (endDate && itemDate > endDate) return false;
        return true;
    });

    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">Tidak ada data trip.</td></tr>`;
        return;
    }

    // Hanya merender baris (tr), bukan seluruh tabel
    tbody.innerHTML = filtered.map(i => `
        <tr>
            <td style="font-size: 0.75rem;">${formatTglLaporan(i.tanggal)}</td>
            <td style="font-size: 0.75rem;">${i.supplier}</td>
            <td style="font-size: 0.75rem;">${i.plat}</td>
            <td class="text-end" style="font-size: 0.8rem;">${(Number(i.netto) || 0).toLocaleString()}</td>
            <td class="text-end" style="font-size: 0.8rem;">${(Number(i.pot_kg) || 0).toLocaleString()}</td>
            <td class="text-center" style="font-size: 0.8rem;">${formatAngka(i.persenpot || 0)}%</td>
        </tr>
    `).join('');
}

function logout() { sessionStorage.clear(); window.location.href = "../login.html"; }

window.onload = () => {
    const now = new Date();
    document.getElementById('dateStart').value = formatTglInput(new Date(now.getFullYear(), now.getMonth(), 1));
    document.getElementById('dateEnd').value = formatTglInput(now);
    callJSONP('report', 'handleReport');
    callJSONP('detail_trip', 'handleTrip');
};
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
